services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: fitness_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  bot:
    build: .
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - '3000:3000'
    command: sh -c "npx prisma migrate deploy && node dist/src/index.js"

volumes:
  postgres_data:
